<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>東京近郊 花めぐり｜4ヶ国語対応PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c5e2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #f5f7f0;
            color: #2d3e2b;
            padding: 1rem;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 1.5rem 0 1rem;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: -0.3px;
            color: #2c5e2a;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 0.9rem;
            color: #5a6e4a;
            margin-bottom: 1.2rem;
        }

        .lang-bar {
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            flex-wrap: wrap;
            margin: 1.2rem 0 2rem;
        }

        .lang-btn {
            background: #e5e8dc;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #2a4728;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .lang-btn.active {
            background: #2c5e2a;
            color: white;
            box-shadow: 0 2px 6px rgba(44,94,42,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin-top: 0.5rem;
        }

        .card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }

        .card-img {
            height: 160px;
            background: #dde5d0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            position: relative;
        }

        .card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 24px;
            letter-spacing: 0.5px;
        }

        .card-content {
            padding: 1.2rem 1.2rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .spot-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1f3b1e;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .spot-location {
            font-size: 0.8rem;
            color: #8f9e7c;
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .spot-desc {
            font-size: 0.9rem;
            line-height: 1.45;
            color: #3c4f38;
            margin-bottom: 1rem;
            flex: 1;
        }

        .season {
            font-size: 0.75rem;
            background: #f0f2e9;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            color: #5d7353;
            align-self: flex-start;
        }

        footer {
            text-align: center;
            margin: 3rem 0 1rem;
            font-size: 0.75rem;
            color: #7f8f6f;
        }

        @media (max-width: 640px) {
            .grid {
                gap: 1.2rem;
            }
            .card-img {
                height: 130px;
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌸 東京近郊 花めぐり</h1>
        <div class="sub">四季を彩る12スポット | 4言語対応</div>
    </div>

    <div class="lang-bar">
        <button class="lang-btn" data-lang="ja">🇯🇵 日本語</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
        <button class="lang-btn" data-lang="it">🇮🇹 Italiano</button>
    </div>

    <div id="spotsGrid" class="grid"></div>
    <footer>🌿 東西南北バランスよくセレクト | 見頃は気候により変動します</footer>
</div>

<script>
    // ----- スポットデータ (多言語) -----
    const spotsData = [
        { id:1, region:{ja:"東",en:"East",zh:"东",it:"Est"}, icon:"🌊🌼", name:{ja:"国営ひたち海浜公園",en:"Hitachi Seaside Park",zh:"国营常陆海滨公园",it:"Parco Costiero Hitachi"}, location:{ja:"茨城県",en:"Ibaraki",zh:"茨城县",it:"Ibaraki"}, desc:{ja:"春はネモフィラ、秋はコキア。青と緑の絶景コントラスト。",en:"Spring nemophila, summer zinnia, and autumn kochia. Stunning blue-green contrast.",zh:"春季粉蝶花，秋季地肤子。蓝绿交织的绝景。",it:"Nemorilla in primavera, kochia in autunno. Contrasto mozzafiato di blu e verde."}, season:{ja:"春・秋",en:"Spring / Autumn",zh:"春秋季",it:"Primavera / Autunno"} },
        { id:2, region:{ja:"東",en:"East",zh:"东",it:"Est"}, icon:"🐑🌼", name:{ja:"マザー牧場",en:"Mother Farm",zh:"母亲牧场",it:"Mother Farm"}, location:{ja:"千葉県",en:"Chiba",zh:"千叶县",it:"Chiba"}, desc:{ja:"約350万本の菜の花が富士山や東京湾を背景に咲く。",en:"3.5 million rapeseed flowers bloom with Mt.Fuji & Tokyo Bay.",zh:"约350万株油菜花以富士山和东京湾为背景盛开。",it:"3,5 milioni di fiori di colza in fiore sullo sfondo del Monte Fuji e della Baia di Tokyo."}, season:{ja:"春",en:"Spring",zh:"春季",it:"Primavera"} },
        { id:3, region:{ja:"東",en:"East",zh:"东",it:"Est"}, icon:"🚣🌸", name:{ja:"水郷潮来あやめ園",en:"Suigo Itako Ayame-en",zh:"水乡潮来菖蒲园",it:"Giardino degli Iris Suigo Itako"}, location:{ja:"茨城県",en:"Ibaraki",zh:"茨城县",it:"Ibaraki"}, desc:{ja:"500品種のアヤメ。舟から鑑賞できる水郷情緒。",en:"500 iris varieties. Enjoy viewing from a boat.",zh:"500种菖蒲。可乘舟观赏的水乡风情。",it:"500 varietà di iris. Atmosfera suggestiva da osservare in barca."}, season:{ja:"初夏 (5月下旬〜6月)",en:"Early Summer (late May–June)",zh:"初夏 (5月下旬～6月)",it:"Inizio estate (fine maggio–giugno)"} },
        { id:4, region:{ja:"東",en:"East",zh:"东",it:"Est"}, icon:"🌷🌬️", name:{ja:"黎明山農業公園",en:"Reimeisan Agricultural Park",zh:"黎明山农业公园",it:"Parco Agricolo Reimeisan"}, location:{ja:"千葉県",en:"Chiba",zh:"千叶县",it:"Chiba"}, desc:{ja:"オランダ風車と色とりどりのチューリップ畑。",en:"Dutch windmill and colorful tulip fields.",zh:"荷兰风车与五彩缤纷的郁金香花田。",it:"Mulino a vento olandese e campi di tulipani colorati."}, season:{ja:"春 (4月中旬〜5月)",en:"Spring (mid-Apr–May)",zh:"春季 (4月中旬～5月)",it:"Primavera (metà aprile–maggio)"} },
        { id:5, region:{ja:"南",en:"South",zh:"南",it:"Sud"}, icon:"🌳🌺", name:{ja:"国営昭和記念公園",en:"Showa Memorial Park",zh:"国营昭和纪念公园",it:"Parco Commemorativo Showa"}, location:{ja:"東京都立川市",en:"Tachikawa, Tokyo",zh:"东京都立川市",it:"Tachikawa, Tokyo"}, desc:{ja:"ネモフィラ・ポピー・イチョウ。広大な敷地で四季を満喫。",en:"Nemophila, poppies, ginkgo. Vast park for all seasons.",zh:"粉蝶花、虞美人、银杏。广袤园区尽享四季。",it:"Nemorilla, papaveri, ginkgo. Ampio parco da godere in ogni stagione."}, season:{ja:"春・秋",en:"Spring / Autumn",zh:"春秋季",it:"Primavera / Autunno"} },
        { id:6, region:{ja:"南",en:"South",zh:"南",it:"Sud"}, icon:"🌹🌊", name:{ja:"ヴェルニー公園",en:"Verny Park",zh:"威尔尼公园",it:"Parco Verny"}, location:{ja:"神奈川県横須賀市",en:"Yokosuka, Kanagawa",zh:"神奈川县横须贺市",it:"Yokosuka, Kanagawa"}, desc:{ja:"フランス式バラ園と海の眺め。初夏のバラが見頃。",en:"French-style rose garden with ocean view. Roses peak in early summer.",zh:"法式玫瑰园与海景。初夏玫瑰最佳。",it:"Giardino di rose in stile francese con vista mare. Rose al culmine all'inizio dell'estate."}, season:{ja:"初夏〜夏 (5月下旬〜7月)",en:"Early Summer–Summer",zh:"初夏～夏季",it:"Inizio estate–Estate"} },
        { id:7, region:{ja:"南",en:"South",zh:"南",it:"Sud"}, icon:"🌺🌊", name:{ja:"小田原フラワーガーデン",en:"Odawara Flower Garden",zh:"小田原花卉园",it:"Giardino Floreale di Odawara"}, location:{ja:"神奈川県小田原市",en:"Odawara, Kanagawa",zh:"神奈川县小田原市",it:"Odawara, Kanagawa"}, desc:{ja:"ツツジやサクラの名所。海を望む四季の花々。",en:"Famous for azaleas & cherry blossoms. Flowers with ocean view.",zh:"杜鹃花与樱花名胜。可眺望大海的四季花卉。",it:"Famoso per azalee e ciliegi. Fiori che si affacciano sul mare."}, season:{ja:"春〜秋",en:"Spring–Autumn",zh:"春季～秋季",it:"Primavera–Autunno"} },
        { id:8, region:{ja:"西",en:"West",zh:"西",it:"Ovest"}, icon:"🐏🌸", name:{ja:"羊山公園",en:"Hitsujiyama Park",zh:"羊山公园",it:"Parco Hitsujiyama"}, location:{ja:"埼玉県秩父市",en:"Chichibu, Saitama",zh:"埼玉县秩父市",it:"Chichibu, Saitama"}, desc:{ja:"約40万株の芝桜がピンクのじゅうたんに。",en:"400,000 shiba-zakura (moss phlox) create a pink carpet.",zh:"约40万株芝樱如粉色绒毯。",it:"400.000 fiori di muschio creano un tappeto rosa."}, season:{ja:"春 (4月中旬〜5月上旬)",en:"Spring (mid-Apr–early May)",zh:"春季 (4月中旬～5月上旬)",it:"Primavera (metà aprile–inizio maggio)"} },
        { id:9, region:{ja:"西",en:"West",zh:"西",it:"Ovest"}, icon:"🌸🟡", name:{ja:"権現堂桜堤",en:"Gongendo Sakura Tsutsumi",zh:"权现堂樱堤",it:"Diga dei Ciliegi Gongendo"}, location:{ja:"埼玉県幸手市",en:"Satte, Saitama",zh:"埼玉县幸手市",it:"Satte, Saitama"}, desc:{ja:"1kmの桜トンネルと菜の花の黄色のコラボ。",en:"1km cherry blossom tunnel with yellow rapeseed flowers.",zh:"1公里樱花隧道与油菜花黄色交织。",it:"Tunnel di ciliegi di 1 km con fiori di colza gialli."}, season:{ja:"春 (3月下旬〜4月上旬)",en:"Spring (late Mar–early Apr)",zh:"春季 (3月下旬～4月上旬)",it:"Primavera (fine marzo–inizio aprile)"} },
        { id:10, region:{ja:"西",en:"West",zh:"西",it:"Ovest"}, icon:"🌹🎨", name:{ja:"敷島公園 門倉ローズガーデン",en:"Shikishima Park Kadokura Rose Garden",zh:"敷岛公园门仓玫瑰园",it:"Giardino delle Rose Kadokura"}, location:{ja:"群馬県前橋市",en:"Maebashi, Gunma",zh:"群马县前桥市",it:"Maebashi, Gunma"}, desc:{ja:"約7,000本のバラ。花色が変わる品種も。",en:"About 7,000 roses. Some varieties change color.",zh:"约7000株玫瑰。部分品种会变色。",it:"Circa 7.000 rose. Alcune varietà cambiano colore."}, season:{ja:"春・秋",en:"Spring / Autumn",zh:"春秋季",it:"Primavera / Autunno"} },
        { id:11, region:{ja:"北",en:"North",zh:"北",it:"Nord"}, icon:"🍇🌸", name:{ja:"あしかがフラワーパーク",en:"Ashikaga Flower Park",zh:"足利花卉公园",it:"Ashikaga Flower Park"}, location:{ja:"栃木県足利市",en:"Ashikaga, Tochigi",zh:"栃木县足利市",it:"Ashikaga, Tochigi"}, desc:{ja:"樹齢150年超の大藤と藤のトンネル。",en:"Great wisteria over 150 years old & wisteria tunnel.",zh:"树龄超150年的大藤与紫藤隧道。",it:"Glicine gigante di oltre 150 anni e tunnel di glicine."}, season:{ja:"春 (4月中旬〜5月中旬)",en:"Spring (mid-Apr–mid-May)",zh:"春季 (4月中旬～5月中旬)",it:"Primavera (metà aprile–metà maggio)"} },
        { id:12, region:{ja:"北",en:"North",zh:"北",it:"Nord"}, icon:"💜🌿", name:{ja:"たんばらラベンダーパーク",en:"Tanbara Lavender Park",zh:"丹原薰衣草公园",it:"Parco della Lavanda Tanbara"}, location:{ja:"群馬県沼田市",en:"Numata, Gunma",zh:"群马县沼田市",it:"Numata, Gunma"}, desc:{ja:"関東北部最大級のラベンダー畑 (約5万株)。7〜8月が見頃。",en:"One of largest lavender fields in northern Kanto (50k plants). Peak July–Aug.",zh:"关东北部最大级薰衣草田（约5万株）。7～8月最佳。",it:"Uno dei più grandi campi di lavanda nel nord del Kanto (50.000 piante). Da metà luglio ad agosto."}, season:{ja:"夏 (7月中旬〜8月上旬)",en:"Summer (mid-July–early Aug)",zh:"夏季 (7月中旬～8月上旬)",it:"Estate (metà luglio–inizio agosto)"} }
    ];

    let currentLang = "ja";

    function getRegionLabel(regionObj, lang) {
        return regionObj[lang] || regionObj.ja;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderSpots() {
        const grid = document.getElementById("spotsGrid");
        if (!grid) return;
        grid.innerHTML = "";
        spotsData.forEach(spot => {
            const name = spot.name[currentLang] || spot.name.ja;
            const location = spot.location[currentLang] || spot.location.ja;
            const desc = spot.desc[currentLang] || spot.desc.ja;
            const season = spot.season[currentLang] || spot.season.ja;
            const region = getRegionLabel(spot.region, currentLang);
            const icon = spot.icon || "🌸";
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-img">
                    <span>${escapeHtml(icon)}</span>
                    <div class="card-badge">${escapeHtml(region)}</div>
                </div>
                <div class="card-content">
                    <div class="spot-name">${escapeHtml(name)}</div>
                    <div class="spot-location">📍 ${escapeHtml(location)}</div>
                    <div class="spot-desc">${escapeHtml(desc)}</div>
                    <div class="season">🗓️ ${escapeHtml(season)}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function setLanguage(lang) {
        currentLang = lang;
        renderSpots();
        document.querySelectorAll(".lang-btn").forEach(btn => {
            if (btn.getAttribute("data-lang") === lang) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }

    // Service Worker 登録
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('ServiceWorker registration success:', reg.scope);
            }).catch(err => {
                console.log('ServiceWorker registration failed:', err);
            });
        });
    }

    function init() {
        const btns = document.querySelectorAll(".lang-btn");
        btns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                const lang = btn.getAttribute("data-lang");
                if (lang) setLanguage(lang);
            });
        });
        setLanguage("ja");
    }
    init();
</script>
</body>
</html>
